services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kangqei-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      DATA_DIR: /app/data
    volumes:
      - kangqei_data:/app/data
    restart: unless-stopped

volumes:
  kangqei_data:
